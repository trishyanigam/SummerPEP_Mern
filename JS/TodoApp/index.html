<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Task App</h1>
        <section>
            <h2>Add Task</h2>
            <form action="">
                <div>
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" placeholder="Enter task title"><br><br>
                </div>

                <div>
                <label for="description">Description:</label>
                <textarea id="description" name="description" placeholder="Enter task description"></textarea><br><br>
                </div>

                <button type="submit">Add Task</button>
            </form>
        </section>
        <section>
            <h2>Todo List</h2>
            <ul id="todo">

            </ul>
        </section>
    </main>
    <script src="script.js"></script>

</body>
</html>
